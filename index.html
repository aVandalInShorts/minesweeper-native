<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Minesweeper Vandal</title>
		<link rel="stylesheet" href="./css/style.css" />
	</head>
	<body>
		<div class="big-container">
			<header class="controls">
				<div class="controls-col">
					<div class="h1">Difficulties</div>
					<button type="button" data-difficulty="easy">Easy</button>
					<button type="button" data-difficulty="medium">
						Medium
					</button>
					<button type="button" data-difficulty="hard">Hard</button>
				</div>
				<div class="controls-col">
					<div class="h1">Inputs</div>
					<label>
						<span>Rows</span>
						<input
							type="number"
							value="9"
							step="1"
							min="3"
							max="20"
							data-input="rows"
						/>
					</label>
					<label>
						<span>Columns</span>
						<input
							type="number"
							value="9"
							step="1"
							min="3"
							max="30"
							data-input="columns"
						/>
					</label>
					<label>
						<span>Mines</span>
						<input
							type="number"
							value="10"
							step="1"
							min="1"
							max="80"
							data-input="mines"
						/>
					</label>
					<label>
						<span>Theme</span>
						<select data-theme-select="">
							<option value="default">Default</option>
							<option value="dark">Dark</option>
							<option value="dr-pepper">Dr. Pepper</option>
							<option value="watermelon">Watermelon</option>
							<option value="lime">lime</option>
						</select>
					</label>
				</div>
				<!-- <div class="controls-col controls__start-col">
					<button type="button" data-start-btn>New game</button>
				</div> -->
			</header>
			<div class="window-ctn">
				<div class="window" data-board-theme="">
					<div class="top-bar">
						<div class="top-bar__left">
							<span class="top-bar__icon">💣</span>
							<div class="top-bar__title">Minesweeper Vandal</div>
						</div>
						<div class="top-bar__right">
							<span class="top-bar__minify"></span>
							<span class="top-bar__enlarge"></span>
							<span class="top-bar__close"></span>
						</div>
					</div>
					<div class="tool-bar">
						<div class="tool-bar__item">
							<button
								type="button"
								class="no-style tool-bar__btn"
							>
								<u>G</u>ame
							</button>
							<div class="tool-bar__popover">
								<button
									type="button"
									class="no-style tool-bar__popover-btn"
								>
									New game
								</button>
								<div class="tool-bar__popover-gap"></div>
								<button
									type="button"
									class="no-style tool-bar__popover-btn"
									data-new-game="beginner"
								>
									Beginner
								</button>
								<button
									type="button"
									class="no-style tool-bar__popover-btn"
									data-new-game="intermediate"
								>
									Intermediate
								</button>
								<button
									type="button"
									class="no-style tool-bar__popover-btn"
									data-new-game="expert"
								>
									Expert
								</button>
							</div>
						</div>
					</div>
					<div class="scene">
						<div class="header">
							<div class="counter" data-flag-remaining>
								<span class="placeholder">0</span>

							<div class="counter" data-timer>
								<span class="placeholder">0</span>
								<span class="placeholder">0</span>
								<span class="placeholder">0</span>
							</div>
						</div>
						<div class="board" data-board></div>
					</div>
					<div class="summary-bar">
						<div
							class="summary-bar__content"
							data-summary-bar-content

							<span data-summary-difficulty>Expert</span> -
							<span data-summary-grid>16x30</span>,
							<span data-summary-mines>99</span>
							mines
						</div>
					</div>
				</div>
			</div>
